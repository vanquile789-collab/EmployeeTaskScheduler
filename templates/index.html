<!DOCTYPE html>
<html>
<head>
    <title>Task Scheduler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center mb-4">Employee Task Scheduler</h1>

    <form method="POST" class="d-flex mb-3">
        <input type="text" name="task" class="form-control me-2" placeholder="Nhập công việc">
        <button type="submit" class="btn btn-primary">Thêm</button>
    </form>

    <ul class="list-group">
        {% for task in tasks %}
        <li class="list-group-item d-flex justify-content-between">
            {{ task }}
            <a href="/delete/{{ loop.index0 }}" class="btn btn-danger btn-sm">X</a>
        </li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
